<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Harsh Singla</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: #98FF98; /* Mint green accent */
      --primary-dark: #7AD07A; /* Darker mint */
      --dark: #2E2E2E; /* Dark gray background */
      --darker: #252525; /* Slightly darker for contrast */
      --light: #F5F5F5; /* Off-white text */
      --gray: #3D3D3D; /* Medium gray for elements */
      --card-bg: #383838; /* Card background */
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: var(--dark);
      color: var(--light);
      scroll-behavior: smooth;
      line-height: 1.6;
    }

    /* Navbar */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: var(--darker);
      padding: 1.5rem 5%;
      position: fixed;
      width: 100%;
      top: 0;
      z-index: 1000;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      border-bottom: 1px solid rgba(152, 255, 152, 0.2);
    }

    .logo {
      color: var(--primary);
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: all 0.3s ease;
      text-decoration: none;
    }

    .logo:hover {
      transform: scale(1.05);
      text-shadow: 0 0 15px rgba(152, 255, 152, 0.5);
    }

    .nav-links {
      list-style: none;
      display: flex;
      gap: 2rem;
    }

    .nav-links li a {
      color: var(--light);
      text-decoration: none;
      font-weight: 500;
      padding: 0.5rem 0;
      position: relative;
      transition: all 0.3s ease;
      font-size: 0.95rem;
    }
    
    .nav-links li a:hover,
    .nav-links li a.active {
      color: var(--primary);
    }

    .nav-links li a::after {
      content: '';
      position: absolute;
      width: 0;
      height: 2px;
      bottom: 0;
      left: 0;
      background-color: var(--primary);
      transition: width 0.3s;
    }

    .nav-links li a:hover::after,
    .nav-links li a.active::after {
      width: 100%;
    }

    /* Main Content */
    .section {
      padding: 8rem 10% 4rem;
    }

    .section-title {
      text-align: center;
      font-size: 2.8rem;
      margin-bottom: 4rem;
      color: var(--primary);
      position: relative;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.8s;
      font-weight: 700;
    }

    .section-title.show {
      opacity: 1;
      transform: translateY(0);
    }

    .section-title::after {
      content: '';
      position: absolute;
      width: 100px;
      height: 4px;
      background-color: var(--primary);
      bottom: -15px;
      left: 50%;
      transform: translateX(-50%);
      border-radius: 2px;
    }

    /* Contact Content */
    .contact-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 3rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    .contact-info {
      background: var(--card-bg);
      border-radius: 10px;
      padding: 2.5rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.8s;
      border: 1px solid rgba(152, 255, 152, 0.1);
    }

    .contact-info.show {
      opacity: 1;
      transform: translateY(0);
    }

    .contact-info h3 {
      color: var(--primary);
      font-size: 1.5rem;
      margin-bottom: 1.5rem;
      position: relative;
      padding-bottom: 0.5rem;
    }

    .contact-info h3::after {
      content: '';
      position: absolute;
      width: 50px;
      height: 3px;
      background-color: var(--primary);
      bottom: 0;
      left: 0;
      border-radius: 2px;
    }

    .contact-details {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 1.5rem;
      transition: all 0.3s;
      padding: 1rem;
      border-radius: 8px;
    }

    .contact-item:hover {
      background-color: rgba(152, 255, 152, 0.1);
      transform: translateX(5px);
    }

    .contact-icon {
      background-color: var(--primary);
      color: var(--darker);
      width: 50px;
      height: 50px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-shrink: 0;
      transition: all 0.3s;
      font-size: 1.2rem;
    }

    .contact-item:hover .contact-icon {
      background-color: var(--primary-dark);
      transform: rotate(15deg) scale(1.1);
    }

    .contact-text h4 {
      margin: 0;
      color: var(--light);
      font-size: 1.1rem;
    }

    .contact-text p, .contact-text a {
      margin: 0.5rem 0 0;
      color: rgba(245,245,245,0.8);
      text-decoration: none;
      transition: color 0.3s;
      font-weight: 300;
    }

    .contact-text a:hover {
      color: var(--primary);
    }

    /* Contact Form */
    .contact-form {
      background: var(--card-bg);
      border-radius: 10px;
      padding: 2.5rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.8s;
      border: 1px solid rgba(152, 255, 152, 0.1);
    }

    .contact-form.show {
      opacity: 1;
      transform: translateY(0);
    }

    .form-group {
      margin-bottom: 1.8rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.8rem;
      color: var(--light);
      font-weight: 500;
    }

    .form-control {
      width: 100%;
      padding: 1rem;
      border: 1px solid var(--gray);
      border-radius: 8px;
      font-family: 'Poppins', sans-serif;
      transition: all 0.3s;
      background-color: var(--darker);
      color: var(--light);
    }

    .form-control:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(152, 255, 152, 0.2);
    }

    textarea.form-control {
      min-height: 180px;
      resize: vertical;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
      padding: 1rem 2.2rem;
      background-color: var(--primary);
      color: var(--darker);
      border: none;
      border-radius: 50px;
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      width: 100%;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 0.9rem;
      box-shadow: 0 4px 15px rgba(152, 255, 152, 0.3);
    }

    .btn:hover {
      background-color: var(--primary-dark);
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(152, 255, 152, 0.4);
    }

    /* Social Links */
    .social-links {
      display: flex;
      gap: 1.5rem;
      margin-top: 2rem;
    }

    .social-links a {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 50px;
      height: 50px;
      background-color: var(--gray);
      color: var(--light);
      border-radius: 50%;
      transition: all 0.3s;
      font-size: 1.2rem;
    }

    .social-links a:hover {
      background-color: var(--primary);
      color: var(--darker);
      transform: translateY(-5px) scale(1.1);
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 3rem;
      background-color: var(--darker);
      color: var(--light);
      border-top: 1px solid var(--gray);
    }

    footer p {
      color: var(--primary);
    }

    /* Back to Top Button */
    .back-to-top {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 60px;
      height: 60px;
      background-color: var(--primary);
      color: var(--darker);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      text-decoration: none;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s;
      z-index: 999;
      box-shadow: 0 4px 20px rgba(152, 255, 152, 0.3);
      font-size: 1.5rem;
    }

    .back-to-top.visible {
      opacity: 1;
      visibility: visible;
    }

    .back-to-top:hover {
      background-color: var(--primary-dark);
      transform: translateY(-5px) scale(1.1);
    }

    /* Responsive */
    @media (max-width: 992px) {
      .section {
        padding: 7rem 5% 3rem;
      }
      
      .nav-links {
        gap: 1.5rem;
      }
    }

    @media (max-width: 768px) {
      .section {
        padding: 6rem 5% 2rem;
      }
      
      .contact-container {
        grid-template-columns: 1fr;
      }
      
      .nav-links {
        gap: 1rem;
        font-size: 0.9rem;
      }

      .logo {
        font-size: 1.5rem;
      }

      .section-title {
        font-size: 2.2rem;
      }
    }

    @media (max-width: 576px) {
      .navbar {
        flex-direction: column;
        padding: 1rem;
      }

      .nav-links {
        margin-top: 1rem;
      }

      .section-title {
        font-size: 1.8rem;
        margin-bottom: 3rem;
      }

      .contact-info, .contact-form {
        padding: 1.5rem;
      }
    }
  </style>
</head>
<body>

  <a href="#" class="back-to-top"><i class="fas fa-arrow-up"></i></a>

  <script>
    // Scroll animations
    const animateOnScroll = () => {
      const elements = document.querySelectorAll('.section-title, .contact-info, .contact-form');
      
      elements.forEach(element => {
        const elementPosition = element.getBoundingClientRect().top;
        const screenPosition = window.innerHeight / 1.2;
        
        if (elementPosition < screenPosition) {
          element.classList.add('show');
        }
      });
    };

    // Run on load and scroll
    window.addEventListener('load', animateOnScroll);
    window.addEventListener('scroll', animateOnScroll);

    // Back to top button
    const backToTopButton = document.querySelector('.back-to-top');
    
    window.addEventListener('scroll', () => {
      if (window.pageYOffset > 300) {
        backToTopButton.classList.add('visible');
      } else {
        backToTopButton.classList.remove('visible');
      }
    });

    // Update active nav link
    document.querySelectorAll('.nav-links li a').forEach(link => {
      if (link.getAttribute('href') === 'contact.html') {
        link.classList.add('active');
      } else {
        link.classList.remove('active');
      }
    });

    // Form submission handling
    const contactForm = document.querySelector('.contact-form');
    if (contactForm) {
      contactForm.addEventListener('submit', function(e) {
        // You can add form validation or AJAX submission here
        console.log('Form submitted');
        // e.preventDefault(); // Uncomment to prevent default form submission
      });
    }
  </script>
